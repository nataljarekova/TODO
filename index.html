<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Shopping List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-card">
        <header>
            <div class="icon-circle">🛒</div>
            <h1>Список покупок</h1>
            <p id="dateDisplay"></p>
        </header>
        
        <div class="input-box">
            <input type="text" id="itemInput" placeholder="Добавить продукт..." autocomplete="off">
            <button id="addBtn"><span>+</span></button>
        </div>

        <ul id="shoppingList"></ul>

        <div class="footer-actions">
            <button id="clearAllBtn" class="btn-secondary">Очистить всё</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
